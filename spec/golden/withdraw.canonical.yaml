version: v0
block:
  name: Withdraw
  kind: logic
  contract:
    inputs:
    - name: accountId
      type: string
    - name: amount
      type: decimal
    - name: currency
      type: string
    - name: txId
      type: string
    outputs:
    - name: balance
      type: decimal
  effects:
    allow:
    - port: idempotency
      ops:
      - get
      - put
    - port: ledger
      ops:
      - getBalance
      - setBalance
  idempotency:
    key: txId
    store:
      port: idempotency
      getOp: get
      putOp: put
  invariants:
  - kind: non_negative
    field: balance
