version: v1
block:
  name: Withdraw
  kind: logic
  operations:
  - name: ExecuteWithdraw
    contract:
      inputs:
      - name: accountId
        type: string
      - name: amount
        type: decimal
      - name: currency
        type: string
      - name: txId
        type: string
      outputs:
      - name: balance
        type: decimal
    uses:
      allow:
      - port: idempotency
        ops:
        - get
        - put
      - port: ledger
        ops:
        - getBalance
        - setBalance
    idempotency:
      mode: use
      key: txId
    invariants:
    - kind: non_negative
      scope: result
      field: balance
  effects:
    allow:
    - port: idempotency
      ops:
      - get
      - put
    - port: ledger
      ops:
      - getBalance
      - setBalance
  idempotency:
    store:
      port: idempotency
      getOp: get
      putOp: put
  invariants:
  - kind: non_negative
    scope: result
    field: balance
